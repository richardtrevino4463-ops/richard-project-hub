<!DOCTYPE html>
<html>
<head>
    <title>Contact Richard Trevino</title>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center;">

    <div style="width: 100%; max-width: 600px; margin-bottom: 20px;">
        <a href="/" style="color: #3498db; text-decoration: none; font-weight: bold;">← Back to Home</a>
    </div>

    <div style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; overflow: hidden; border-top: 5px solid #2c3e50;">
        
        <div style="background: #2c3e50; color: white; padding: 30px; text-align: center;">
            <h2 style="margin: 0 0 10px 0; font-size: 1.8rem;">Let's Connect</h2>
            <p style="margin: 0; color: #bdc3c7;">Computer Science Student & Aspiring Software Engineer</p>
        </div>

        <div style="padding: 40px;">
            <form action="https://formspree.io/f/maqzjend" method="POST">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #34495e;">Name</label>
                    <input type="text" name="name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #34495e;">Email Address</label>
                    <input type="email" name="_replyto" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #34495e;">Message</label>
                    <textarea name="message" rows="5" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; resize: vertical;"></textarea>
                </div>

                <button type="submit" style="background: #3498db; color: white; border: none; padding: 12px 25px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem;">
                    Send Message
                </button>
            </form>
        </div>
    </div>

</body>
</html>
