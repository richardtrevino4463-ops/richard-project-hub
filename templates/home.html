<!DOCTYPE html>
<html>
<head>
    <title>Richard Trevino's Site</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
             background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?q=80&w=2070&auto=format&fit=crop'); 
             background-size: cover; background-position: center; height: 100vh; 
             display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">

    <div style="text-align: center; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); padding: 40px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 550px; border: 1px solid rgba(255,255,255,0.2);">
        
        <h1 style="font-size: 2.6rem; margin-top: 0; margin-bottom: 10px; color: #1a365d; letter-spacing: 0.5px;">Richard Trevino's Project Hub</h1>
        <p style="font-size: 1.1rem; margin-bottom: 30px; color: #4a5568;">Welcome to my personal corner of the internet.</p>
        
        <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
            <a href="/projects" style="background: #3498db; color: white; padding: 12px 40px; text-decoration: none; font-weight: bold; border-radius: 25px; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); display: inline-block; width: 180px;">
                View My Projects →
            </a>
            
            <a href="/contact" style="background: #2c3e50; color: white; padding: 12px 40px; text-decoration: none; font-weight: bold; border-radius: 25px; box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3); display: inline-block; width: 180px;">
                Contact Me
            </a>
        </div>
    </div>

    <div style="position: absolute; bottom: 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;">
        👁️ Visitor Count: <span style="color: #3498db; font-size: 1.1rem;">{{ count }}</span>
    </div>

</body>
</html>
